services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docarchive
      POSTGRES_USER: docarchive
      POSTGRES_PASSWORD: docarchive_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docarchive"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/Backend
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=docarchive;Username=docarchive;Password=docarchive_pass"
      Jwt__Secret: "CHANGE_THIS_TO_A_SECURE_SECRET_KEY_AT_LEAST_32_CHARS_LONG_FOR_PRODUCTION"
      Jwt__Issuer: "DocArchive"
      Jwt__Audience: "DocArchive"
      Jwt__AccessTokenMinutes: "15"
      Storage__Path: "/app/storage"
      Cors__Origins__0: "http://localhost"
      Cors__Origins__1: "http://localhost:80"
    volumes:
      - storage_data:/app/storage
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./src/Frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  storage_data:
  backend_logs:
